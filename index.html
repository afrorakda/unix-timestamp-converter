<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unix Timestamp Converter</title>
    <link rel="apple-touch-icon" href="image_30.png">
    <link rel="icon" type="image/png" href="image_30.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --warning: #f39c12;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: var(--bg); color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            -webkit-font-smoothing: antialiased;
        }
        .fridge-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; flex-grow: 1; }
        header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; }
        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 14px; border-radius: 12px;
        }
        .subtitle { font-size: 0.85rem; color: #999; font-weight: 700; margin-bottom: 25px; }
        .label-group { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; font-weight: 800; color: #bbb; margin-bottom: 8px; text-transform: uppercase; }
        
        .unit-badge { font-size: 0.6rem; background: var(--main); color: #fff; padding: 2px 8px; border-radius: 10px; opacity: 0; transition: 0.3s; font-weight: 900; }
        .unit-badge.show { opacity: 1; }
        .unit-badge.ms { background: var(--warning); }

        input {
            width: 100%; padding: 18px; border-radius: var(--radius);
            border: 2px solid var(--accent); background: var(--input-bg);
            font-size: 1.2rem; font-weight: 900; color: var(--main);
            outline: none; -webkit-appearance: none; -webkit-text-fill-color: var(--main);
            opacity: 1 !important; margin-bottom: 15px;
        }
        input::placeholder { color: #ccc; -webkit-text-fill-color: #ccc; font-weight: 700; }
        input[type="datetime-local"] { font-family: inherit; font-size: 1rem; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn {
            padding: 18px; border-radius: var(--radius); border: none;
            font-size: 0.9rem; font-weight: 900; cursor: pointer; transition: 0.2s;
            -webkit-appearance: none;
        }
        .btn-main { background: var(--main); color: #fff; -webkit-text-fill-color: #fff; }
        .btn-sub { background: var(--accent); color: var(--main); -webkit-text-fill-color: var(--main); }
        
        textarea {
            width: 100%; height: 130px; padding: 20px; border: 2px solid var(--accent);
            border-radius: var(--radius); background: var(--input-bg);
            font-family: ui-monospace, monospace;
            font-size: 0.85rem; font-weight: 700; resize: none; outline: none;
            color: var(--main) !important; -webkit-text-fill-color: var(--main);
            opacity: 1 !important; margin-bottom: 20px; line-height: 1.5;
            transition: background-color 0.4s ease;
        }
        /* コピー時のフラッシュアニメーション */
        .flash { background-color: #d0d0d0 !important; }

        footer { margin-top: auto; text-align: center; padding-top: 30px; }
        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
        .kofi-btn {
            width: 100%; background: var(--main); color: #fff; padding: 16px;
            border-radius: var(--radius); text-decoration: none; font-weight: 900; font-size: 0.9rem;
            -webkit-text-fill-color: #fff;
        }
        .home-btn {
            width: 100%; background: var(--accent); color: var(--main); padding: 14px;
            border-radius: var(--radius); font-weight: 800; font-size: 0.85rem;
            cursor: pointer; border: none; -webkit-appearance: none;
        }
        .legal { font-size: 0.7rem; color: #bbb; line-height: 1.6; font-weight: 600; }
        .legal a { color: inherit; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 35px; border-radius: var(--radius); width: 85%; max-width: 340px; text-align: left; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <h1>Unix Timestamp</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">2-way converter for Epoch time.</p>

    <div class="label-group">
        <span>Timestamp</span>
        <span id="unitBadge" class="unit-badge">SECONDS</span>
    </div>
    <input type="number" id="tsIn" placeholder="Enter Unix Time" oninput="fromTs()">

    <div class="label-group"><span>Manual Date Pick</span></div>
    <input type="datetime-local" id="dateIn" oninput="fromDate()">

    <div class="btn-group">
        <button class="btn btn-sub" onclick="setNow()">Set Current</button>
        <button class="btn btn-sub" onclick="location.reload()">Clear All</button>
    </div>

    <div class="label-group"><span>Results</span></div>
    <textarea id="res" readonly placeholder="Calculated data..."></textarea>

    <button class="btn btn-main" style="width:100%" onclick="copyRes()">Copy Result</button>

    <footer>
        <div class="footer-btns">
            <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
            <button class="home-btn" onclick="toggleModal(true)">Add to Home Screen</button>
        </div>
        <p class="legal">
            No login / No tracking / No ads / Browser only<br>
            <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
        </p>
    </footer>
</div>

<div id="homeModal" class="modal" onclick="toggleModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="toggleModal(false)">×</span>
        <div style="font-size:1.3rem; font-weight:900; margin-bottom:15px;">📱 Install</div>
        <p style="font-size:0.85rem; font-weight:700;"><strong>🍏 iPhone:</strong> Share > Add to Home Screen</p>
        <p style="font-size:0.85rem; font-weight:700; margin-top:10px;"><strong>🤖 Android:</strong> Menu > Add to Home Screen</p>
    </div>
</div>

<script>
    function setNow() {
        const now = Date.now();
        document.getElementById('tsIn').value = Math.floor(now / 1000);
        fromTs();
    }

    function fromTs() {
        const val = document.getElementById('tsIn').value;
        const badge = document.getElementById('unitBadge');
        if(!val) { badge.classList.remove('show'); return clearOutputs(); }
        
        let ts = parseInt(val);
        if (val.length >= 13) {
            badge.textContent = 'MILLISECONDS';
            badge.classList.add('show', 'ms');
        } else {
            badge.textContent = 'SECONDS';
            badge.classList.remove('ms');
            badge.classList.add('show');
            ts *= 1000;
        }
        
        const d = new Date(ts);
        if(isNaN(d.getTime())) return document.getElementById('res').value = 'Invalid Timestamp';
        
        updateRes(d);
        const localISO = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
        document.getElementById('dateIn').value = localISO;
    }

    function fromDate() {
        const val = document.getElementById('dateIn').value;
        if(!val) return;
        const d = new Date(val);
        document.getElementById('tsIn').value = Math.floor(d.getTime() / 1000);
        const badge = document.getElementById('unitBadge');
        badge.textContent = 'SECONDS';
        badge.classList.remove('ms');
        badge.classList.add('show');
        updateRes(d);
    }

    function updateRes(d) {
        const local = "LOCAL: " + d.toLocaleString();
        const utc   = "UTC:   " + d.toUTCString();
        const iso   = "ISO:   " + d.toISOString();
        const unix  = "UNIX:  " + Math.floor(d.getTime() / 1000);
        document.getElementById('res').value = `${local}\n${utc}\n${iso}\n${unix}`;
    }

    function clearOutputs() {
        document.getElementById('res').value = '';
        document.getElementById('dateIn').value = '';
        document.getElementById('unitBadge').classList.remove('show');
    }

    function copyRes() {
        const out = document.getElementById('res');
        if(!out.value || out.value === 'Invalid Timestamp') return;
        
        navigator.clipboard.writeText(out.value).then(() => {
            // フィードバックフラッシュ（トースト廃止）
            out.classList.add('flash');
            setTimeout(() => out.classList.remove('flash'), 400);
        });
    }

    function toggleModal(s) { document.getElementById('homeModal').style.display = s ? 'flex' : 'none'; }

    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.kofi) document.querySelector('.kofi-btn').textContent = data.kofi.text;
            }
        } catch (e) {}
    }
    window.onload = loadFooter;
</script>

</body>
</html>
